name: Feed check

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync X RSS feeds
        run: python scripts/sync_x_rss.py

      - name: Validate RSS feeds
        run: python scripts/validate_feeds.py

      - name: Commit updates
        run: |
          if git diff --quiet -- rss/c.v1; then
            echo "No feed status changes."
            exit 0
          fi

          git config user.name "Canpolat Gökkaya"
          git config user.email "canpolatgokkaya@users.noreply.github.com"
          git add rss/c.v1 rss/x7f2a.js rss/k9m3.css
          git commit --author="Canpolat Gökkaya <canpolatgokkaya@users.noreply.github.com>" -m "sync feeds"
          git push
